<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Fortiq Funded</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LMWYY4XETF"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-LMWYY4XETF');
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04060f;--surface:#0f1829;--surface2:#162038;--purple:#6c3de8;--purple3:#a78bfa;--blue:#1e5fff;--text:#f0eeff;--muted:#7a7a9a;--muted2:#555575;--border:rgba(108,61,232,0.25);--border2:rgba(255,255,255,0.06);--success:#00d68f;--error:#ff4d4d;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:var(--min,0.1)}50%{opacity:var(--max,0.7)}}
.glow{position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:700px;height:500px;border-radius:50%;background:radial-gradient(ellipse,rgba(108,61,232,0.15) 0%,transparent 70%);pointer-events:none;z-index:0;}
.card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:440px;box-shadow:0 0 60px rgba(108,61,232,0.15);}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:2rem;text-decoration:none}
.logo-wordmark{font-family:'Cinzel',serif;font-weight:700;font-size:20px;letter-spacing:1px;background:linear-gradient(135deg,#a78bfa,#6c3de8,#3d7fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-wordmark span{background:linear-gradient(135deg,#c9a84c,#e8c96a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.card-title{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:0.4rem}
.card-sub{color:var(--muted);font-size:14px;text-align:center;font-weight:300;margin-bottom:2rem}
.field{margin-bottom:1.2rem}
.field label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px;}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;transition:border-color 0.2s;outline:none;}
.field input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(108,61,232,0.15)}
.field input::placeholder{color:var(--muted2)}
.msg{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:1.2rem;display:none}
.msg.error{background:rgba(255,77,77,0.1);border:1px solid rgba(255,77,77,0.3);color:#ff6b6b;display:block}
.msg.success{background:rgba(0,214,143,0.1);border:1px solid rgba(0,214,143,0.3);color:#00d68f;display:block}
.btn{width:100%;background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;border:none;padding:14px;border-radius:10px;font-family:'Outfit',sans-serif;font-weight:600;font-size:15px;cursor:pointer;transition:opacity 0.2s;box-shadow:0 0 30px rgba(108,61,232,0.3);}
.btn:hover{opacity:0.9}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2)}
.divider span{color:var(--muted2);font-size:12px}
.signup-link{text-align:center;font-size:13px;color:var(--muted)}
.signup-link a{color:var(--purple3);text-decoration:none;font-weight:500}
</style>
</head>
<body>
<div id="stars"></div>
<div class="glow"></div>
<div class="card">
  <a href="index.html" class="logo">
    <svg width="34" height="34" viewBox="0 0 38 38" fill="none">
      <defs>
        <linearGradient id="lg1" x1="0" y1="0" x2="38" y2="38" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#a78bfa"/><stop offset="55%" stop-color="#6c3de8"/><stop offset="100%" stop-color="#3d7fff"/></linearGradient>
        <linearGradient id="lg2" x1="0" y1="0" x2="38" y2="38" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#c9a84c"/><stop offset="100%" stop-color="#e8c96a"/></linearGradient>
      </defs>
      <rect x="4" y="6" width="7" height="9" rx="1.5" fill="url(#lg1)"/>
      <rect x="15.5" y="6" width="7" height="9" rx="1.5" fill="url(#lg1)"/>
      <rect x="27" y="6" width="7" height="9" rx="1.5" fill="url(#lg1)"/>
      <rect x="4" y="14" width="30" height="7" fill="url(#lg1)" opacity="0.85"/>
      <polygon points="19,22 27,28 19,38 11,28" fill="url(#lg2)" opacity="0.95"/>
      <polygon points="19,22 27,28 19,26 11,28" fill="url(#lg1)" opacity="0.7"/>
    </svg>
    <span class="logo-wordmark">Fortiq <span>Funded</span></span>
  </a>

  <h2 class="card-title">Welcome Back</h2>
  <p class="card-sub">Sign in to your Fortiq Funded account</p>

  <div class="msg" id="msg"></div>

  <div class="field">
    <label>Email Address</label>
    <input type="email" id="lemail" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doLogin()"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="lpwd" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()"/>
  </div>
  <div style="text-align:right;margin-bottom:1.2rem">
    <a href="forgot-password.html" style="font-size:12px;color:var(--purple3);text-decoration:none">Forgot password?</a>
  </div>

  <button class="btn" id="loginbtn" onclick="doLogin()">Sign In</button>

  <div class="divider"><span>don't have an account?</span></div>
  <div class="signup-link"><a href="signup.html">Create a free account →</a></div>
</div>

<script>
(function(){
  var c=document.getElementById('stars');
  for(var i=0;i<80;i++){
    var s=document.createElement('div');s.className='star';
    var sz=Math.random()*2+0.5;
    s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;--d:'+(2+Math.random()*4)+'s;--delay:-'+(Math.random()*5)+'s;--min:'+(0.05+Math.random()*0.1)+';--max:'+(0.4+Math.random()*0.6);
    c.appendChild(s);
  }
})();

var sb=window.supabase.createClient(
  'https://qhfsvazxpnjwfxhamkea.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZnN2YXp4cG5qd2Z4aGFta2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTA1NjAsImV4cCI6MjA5MDk4NjU2MH0.16_9IbcNgIEG39Qtmd6OPs2jQqDw-wL20YXvoDY2mCo'
);

function showMsg(txt,type){
  var el=document.getElementById('msg');
  el.textContent=txt;
  el.className='msg '+type;
}

function doLogin(){
  var email=document.getElementById('lemail').value.trim();
  var pwd=document.getElementById('lpwd').value;
  var btn=document.getElementById('loginbtn');
  if(!email){showMsg('Please enter your email.','error');return;}
  if(!pwd){showMsg('Please enter your password.','error');return;}
  btn.disabled=true;btn.textContent='Signing in...';
  sb.auth.signInWithPassword({email:email,password:pwd}).then(function(r){
    if(r.error){
      showMsg('Incorrect email or password. Please try again.','error');
      btn.disabled=false;btn.textContent='Sign In';
      // Track failed login attempt
      gtag('event', 'login_failed', {
        event_category: 'authentication',
        event_label: 'incorrect_credentials'
      });
    } else {
      // Track successful login
      gtag('event', 'login', {
        method: 'email',
        event_category: 'authentication'
      });
      window.location.href='dashboard.html';
    }
  });
}
</script>
</body>
</html>
