<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Password — Fortiq Funded</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04060f;--bg2:#070b18;--surface:#0f1829;--surface2:#162038;
  --purple:#6c3de8;--purple2:#8b5cf6;--purple3:#a78bfa;
  --blue:#1e5fff;--blue2:#3d7fff;
  --text:#f0eeff;--muted:#7a7a9a;--muted2:#555575;
  --border:rgba(108,61,232,0.25);--border2:rgba(255,255,255,0.06);
  --success:#00d68f;--error:#ff4d4d;--gold:#c9a84c;
}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:var(--min,0.1)}50%{opacity:var(--max,0.7)}}
.card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:2.5rem;width:100%;max-width:420px;}
.logo-wrap{text-align:center;margin-bottom:2rem;}
.logo-wordmark{font-family:'Cinzel',serif;font-weight:700;font-size:20px;letter-spacing:1px;background:linear-gradient(135deg,#a78bfa,#6c3de8,#3d7fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-wordmark span{background:linear-gradient(135deg,#c9a84c,#e8c96a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
h1{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;text-align:center;margin-bottom:0.5rem;}
.subtitle{color:var(--muted);font-size:14px;font-weight:300;text-align:center;line-height:1.6;margin-bottom:2rem;}
.fld{margin-bottom:1.2rem;}
.fld label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.fld input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
.fld input:focus{border-color:var(--purple)}
.fld input::placeholder{color:var(--muted2)}
.btn{width:100%;background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;border:none;padding:13px;border-radius:10px;font-family:'Outfit',sans-serif;font-weight:600;font-size:15px;cursor:pointer;transition:all 0.2s;box-shadow:0 0 20px rgba(108,61,232,0.3);margin-top:0.5rem;}
.btn:hover{opacity:0.9;transform:translateY(-1px)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:1rem;display:none;line-height:1.5;}
.msg.ok{background:rgba(0,214,143,0.1);border:1px solid rgba(0,214,143,0.3);color:var(--success);display:block;}
.msg.err{background:rgba(255,77,77,0.1);border:1px solid rgba(255,77,77,0.3);color:var(--error);display:block;}
.back-link{text-align:center;margin-top:1.5rem;}
.back-link a{color:var(--muted);font-size:13px;text-decoration:none;transition:color 0.2s;}
.back-link a:hover{color:var(--purple3)}
.strength-bar{height:4px;border-radius:2px;background:var(--border2);margin-top:6px;overflow:hidden;}
.strength-fill{height:100%;border-radius:2px;transition:width 0.3s,background 0.3s;}
.strength-label{font-size:11px;color:var(--muted);margin-top:4px;}
</style>
</head>
<body>
<div id="stars"></div>

<div class="card">
  <div class="logo-wrap">
    <a href="index.html" style="text-decoration:none;">
      <span class="logo-wordmark">Fortiq <span>Funded</span></span>
    </a>
  </div>
  <h1>Set New Password</h1>
  <p class="subtitle">Enter your new password below. Make sure it's at least 8 characters long.</p>

  <div class="fld">
    <label>New Password</label>
    <input type="password" id="pw1" placeholder="Enter new password" oninput="checkStrength(this.value)"/>
    <div class="strength-bar"><div class="strength-fill" id="strength-fill" style="width:0%"></div></div>
    <div class="strength-label" id="strength-label"></div>
  </div>

  <div class="fld">
    <label>Confirm New Password</label>
    <input type="password" id="pw2" placeholder="Confirm new password"/>
  </div>

  <button class="btn" id="update-btn" onclick="updatePassword()">Update Password</button>
  <div class="msg" id="msg"></div>

  <div class="back-link">
    <a href="login.html">← Back to Login</a>
  </div>
</div>

<script>
var sb=window.supabase.createClient('https://qhfsvazxpnjwfxhamkea.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZnN2YXp4cG5qd2Z4aGFta2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTA1NjAsImV4cCI6MjA5MDk4NjU2MH0.16_9IbcNgIEG39Qtmd6OPs2jQqDw-wL20YXvoDY2mCo');

function checkStrength(pw){
  var fill=document.getElementById('strength-fill');
  var label=document.getElementById('strength-label');
  if(!pw){fill.style.width='0%';label.textContent='';return;}
  var score=0;
  if(pw.length>=8)score++;
  if(pw.length>=12)score++;
  if(/[A-Z]/.test(pw))score++;
  if(/[0-9]/.test(pw))score++;
  if(/[^A-Za-z0-9]/.test(pw))score++;
  var pct=score*20+'%';
  var color=score<=1?'#ff4d4d':score<=2?'#f59e0b':score<=3?'#c9a84c':'#00d68f';
  var txt=score<=1?'Weak':score<=2?'Fair':score<=3?'Good':'Strong';
  fill.style.width=pct;fill.style.background=color;label.textContent='Strength: '+txt;label.style.color=color;
}

function updatePassword(){
  var pw1=document.getElementById('pw1').value;
  var pw2=document.getElementById('pw2').value;
  var msg=document.getElementById('msg');
  var btn=document.getElementById('update-btn');
  msg.className='msg';

  if(!pw1||!pw2){msg.textContent='Please fill in both fields.';msg.className='msg err';return;}
  if(pw1.length<8){msg.textContent='Password must be at least 8 characters.';msg.className='msg err';return;}
  if(pw1!==pw2){msg.textContent='Passwords do not match.';msg.className='msg err';return;}

  btn.disabled=true;btn.textContent='Updating...';

  sb.auth.updateUser({password:pw1}).then(function(r){
    btn.disabled=false;btn.textContent='Update Password';
    if(r.error){
      msg.textContent='Error: '+r.error.message;msg.className='msg err';
    } else {
      msg.textContent='Password updated successfully! Redirecting to login...';msg.className='msg ok';
      setTimeout(function(){window.location.href='login.html';},2500);
    }
  });
}

(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<80;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2+0.5;
    s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;--d:'+(2+Math.random()*4)+'s;--delay:-'+(Math.random()*5)+'s;--min:'+(0.05+Math.random()*0.1)+';--max:'+(0.4+Math.random()*0.6);
    c.appendChild(s);
  }
})();
</script>
</body>
</html>
